---
layout: default
---

<section class="intro">

	<div class="wrap">

		{% if page.profile_image %}
		<div style="display: flex; align-items: center; gap: 25px;">
			<img src="{{ page.profile_image }}" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; flex-shrink: 0;">
			<div>
				<h1 style="margin-bottom: 0.2em;">{{ page.title }}</h1>
				<p>{{ page.subtitle }}</p>
			</div>
		</div>
		{% else %}
		<h1>{{ page.title }}</h1>
		<p>{{ page.subtitle }}</p>
		{% endif %}

	</div>

</section>

<section class="single">

	<div class="wrap">

		{{ page.content }}

	</div>

</section>
